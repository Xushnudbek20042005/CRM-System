name: CRM System CI/CD Pipeline

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Loyiha kodini yuklab olish
        uses: actions/checkout@v4

      - name: AWS EC2 Serverga SSH orqali deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }} 
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd /home/ubuntu/projects/CRM-System
            git pull origin master
            docker compose down
            docker compose up -d --build
