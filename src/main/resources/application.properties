spring.datasource.url=jdbc:mysql://localhost:5542/crm?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=hudoyor
spring.datasource.password=root
# Agar loyihada eski drayver xatosi chiqsa, buni ham qo'shib qo'ying:
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Boyagi sql init rejimini qayta 'always' qilib qo'yamiz, chunki endi baza mos keldi!
spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=none


# --- GOOGLE OAUTH2 SOZLAMALARI ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
# 1. Bu yerga barcha kerakli scope'larni vergul bilan ketma-ket qo'shdik:
# 1. Scope'larni to'g'ri formatda yozamiz:
spring.security.oauth2.client.registration.google.scope=openid,profile,email,https://www.googleapis.com/auth/drive,https://www.googleapis.com/auth/gmail.readonly,https://www.googleapis.com/auth/calendar
# 2. Redirect URI aynan readme'da so'ralgandek (o'zgarishsiz qoladi):
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code


# 3. Provider sozlamalarini standart va toza ko'rinishga keltirdik:
spring.security.oauth2.client.provider.google.issuer-uri=https://accounts.google.com
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth?access_type=offline&prompt=select_account+consent

